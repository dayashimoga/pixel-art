<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art Editor — Free Online Canvas | QuickUtils</title>
    <meta name="keywords" content="QuickUtils, pixel, art, code, design, productivity, online tools">
    <meta name="robots" content="index, follow">
    <meta property="og:url" content="https://quickutils.top/pixel-art/">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="description" content="Free online pixel art editor. Draw, paint, and create sprites instantly in your browser. Export to PNG with ease.">
    <link rel="canonical" href="https://pixelart.quickutils.top">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
    <meta property="og:title" content="Pixel Art Editor">
    <meta property="og:description" content="Create pixel art directly in your browser.">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5193703345853377" crossorigin="anonymous"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PIXEL00001"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-PIXEL00001');</script>
</head>
<body>
    <nav class="navbar"><div class="container nav-inner">
        <a href="/" class="brand">🎨 <span>PixelArt</span></a>
        <div class="nav-links">
            <button class="btn btn-primary btn-sm" id="downloadBtn">⬇️ Export</button>
            <a href="https://ko-fi.com/dayatin" target="_blank" rel="noopener" class="kofi-link">☕ Support</a>
            <a href="https://quickutils.top" target="_blank" rel="noopener">QuickUtils</a>
        </div>
        <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">🌙</button>
    </div></nav>

    <main class="editor-layout">
        <aside class="toolbar glass-panel">
            <div class="tool-group">
                <button class="tool-btn active" data-tool="pencil" title="Pencil (P)">✏️</button>
                <button class="tool-btn" data-tool="eraser" title="Eraser (E)">🧹</button>
                <button class="tool-btn" data-tool="fill" title="Fill Bucket (F)">🪣</button>
            </div>
            
            <div class="color-section mt-4">
                <input type="color" id="currentColor" value="#ff4757" class="color-picker-input">
                <div class="palette-grid mt-2" id="paletteGrid">
                    <!-- Standard palette -->
                    <div class="palette-swatch" style="background:#000000"></div>
                    <div class="palette-swatch" style="background:#576574"></div>
                    <div class="palette-swatch" style="background:#ffffff"></div>
                    <div class="palette-swatch" style="background:#ff4757"></div>
                    <div class="palette-swatch" style="background:#ff7f50"></div>
                    <div class="palette-swatch" style="background:#eccc68"></div>
                    <div class="palette-swatch" style="background:#2ed573"></div>
                    <div class="palette-swatch" style="background:#1e90ff"></div>
                    <div class="palette-swatch" style="background:#5352ed"></div>
                    <div class="palette-swatch" style="background:#ff6b81"></div>
                </div>
            </div>

            <div class="settings-group mt-4">
                <div class="flex-bw text-xs text-muted mb-1">
                    <span>Grid Size</span>
                    <span id="gridSizeReadout">16x16</span>
                </div>
                <input type="range" class="w-100" id="gridSizeSlider" min="8" max="64" step="8" value="16">
                
                <div style="display:flex;gap:4px;margin-top:0.5rem">
                    <button class="btn btn-secondary btn-sm" id="undoBtn" title="Undo (Ctrl+Z)" style="flex:1" disabled>↩ Undo</button>
                    <button class="btn btn-secondary btn-sm" id="redoBtn" title="Redo (Ctrl+Y)" style="flex:1" disabled>↪ Redo</button>
                </div>
                
                <button class="btn btn-secondary w-100 mt-2 btn-sm" id="symmetryBtn" title="Toggle mirror drawing">🪞 Off</button>
                <button class="btn btn-secondary w-100 mt-2 btn-sm" id="clearBtn">🗑️ Clear Canvas</button>
                <label class="btn btn-secondary w-100 mt-2 btn-sm" style="display:block;text-align:center" title="Toggle Grid Lines">
                    <input type="checkbox" id="showGridCheck" checked style="display:none">
                    <span id="gridToggleText">Show Grid</span>
                </label>
                <button class="btn btn-secondary w-100 mt-2 btn-sm" id="asciiBtn">🔤 ASCII Art</button>
            </div>
        </aside>

        <section class="canvas-container" id="canvasContainer">
            <div class="canvas-wrapper">
                <canvas id="pixelCanvas" width="512" height="512"></canvas>
            </div>
            
            <!-- Animation Timeline -->
            <div class="glass-card timeline-panel mt-3" style="padding:1rem">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem">
                    <h3 style="font-size:0.9rem">🎬 Animation Timeline</h3>
                    <div style="display:flex;gap:6px;align-items:center">
                        <span id="frameCount" style="font-size:0.75rem;color:var(--text-muted,#888)">1/1</span>
                        <button class="btn btn-sm btn-secondary" id="addFrameBtn" title="Add frame">+ Frame</button>
                        <button class="btn btn-sm btn-primary" id="playAnimBtn" title="Play animation">▶ Play</button>
                        <button class="btn btn-sm btn-secondary" id="exportSpriteBtn" title="Export spritesheet">📦 Sprite</button>
                    </div>
                </div>
                <div id="timelineFrames" style="display:flex;gap:8px;overflow-x:auto;padding:4px 0"></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
    <script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
    <script>kofiWidgetOverlay.draw('dayatin',{'type':'floating-chat','floating-chat.donateButton.text':'Support Us','floating-chat.donateButton.background-color':'#ff5e5b','floating-chat.donateButton.text-color':'#fff'});</script>
</body>
</html>
